services:
  front:
    image: ghcr.io/${GITHUB_REPOSITORY:-denebolar/mytiny}/tiny-gestion-front:latest
    restart: always
    ports:
      - "3004:80"
    networks:
      - tiny-gestion-network

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-denebolar/mytiny}/tiny-gestion-backend:latest
    restart: always
    env_file:
      - .env-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
      DB_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB:-tiny_gestion}"
      DB_USER: "${POSTGRES_USER:-tiny_gestion_user}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    volumes:
      - tiny_gestion_prod_uploads:/app/uploads
    networks:
      - tiny-gestion-network

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env-prod
    ports:
      - "5436:5432"
    volumes:
      - tiny_gestion_prod_data:/var/lib/postgresql/data
    networks:
      - tiny-gestion-network

networks:
  tiny-gestion-network:
    driver: bridge

volumes:
  tiny_gestion_prod_data:
  tiny_gestion_prod_uploads:
