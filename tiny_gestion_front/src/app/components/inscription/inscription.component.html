<div class="inscription-page">
  <div class="background-glow"></div>
  
  <div class="inscription-card">
    <div class="logo-container">
      <div class="logo-circle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1>Créer un compte</h1>
      <p class="subtitle">Enregistrez-vous pour commencer à suivre votre Tiny House.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="form-container">
      @if (messageErreur) {
        <div class="error-alert">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" x2="12" y1="8" y2="12"/>
            <line x1="12" x2="12.01" y1="16" y2="16"/>
          </svg>
          <span>{{ messageErreur }}</span>
        </div>
      }

      <!-- Section 1 : Mon profil -->
      <h3 class="section-title">Votre Profil</h3>
      
      <div class="form-row">
        <div class="form-group col-6">
          <label for="prenom">Prénom *</label>
          <input 
            type="text" 
            id="prenom" 
            name="prenom" 
            [(ngModel)]="prenom" 
            required 
            placeholder="Ex: Jean"
          />
        </div>
        <div class="form-group col-6">
          <label for="nom">Nom *</label>
          <input 
            type="text" 
            id="nom" 
            name="nom" 
            [(ngModel)]="nom" 
            required 
            placeholder="Ex: Dupont"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Adresse email *</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="votre.email@exemple.com"
        />
      </div>

      <div class="form-row">
        <div class="form-group col-6">
          <label for="password">Mot de passe (8 car. min) *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="motDePasse" 
            required 
            placeholder="••••••••"
          />
        </div>
        <div class="form-group col-6">
          <label for="confirmPassword">Confirmer mot de passe *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmationMotDePasse" 
            required 
            placeholder="••••••••"
          />
        </div>
      </div>

      <!-- Section 2 : Logement -->
      <h3 class="section-title">Votre Tiny House</h3>

      <div class="form-group">
        <label for="nomLogement">Nom de votre Tiny House *</label>
        <input 
          type="text" 
          id="nomLogement" 
          name="nomLogement" 
          [(ngModel)]="nomLogement" 
          required 
          placeholder="Ex: La Tiny du Ruisseau"
        />
      </div>

      <div class="form-group">
        <label for="adresseLogement">Adresse</label>
        <input 
          type="text" 
          id="adresseLogement" 
          name="adresseLogement" 
          [(ngModel)]="adresseLogement" 
          placeholder="Ex: 123 chemin de la Forêt"
        />
      </div>

      <div class="form-row">
        <div class="form-group col-4">
          <label for="codePostalLogement">Code Postal</label>
          <input 
            type="text" 
            id="codePostalLogement" 
            name="codePostalLogement" 
            [(ngModel)]="codePostalLogement" 
            placeholder="Ex: 33000"
          />
        </div>
        <div class="form-group col-8">
          <label for="villeLogement">Ville</label>
          <input 
            type="text" 
            id="villeLogement" 
            name="villeLogement" 
            [(ngModel)]="villeLogement" 
            placeholder="Ex: Bordeaux"
          />
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid || chargement" class="submit-btn">
        @if (chargement) {
          <span class="spinner"></span>
          <span>Création du compte...</span>
        } @else {
          <span>Créer mon compte</span>
        }
      </button>

      <div class="switch-link">
        Déjà inscrit ? <a routerLink="/connexion">Connectez-vous</a>
      </div>
    </form>
  </div>
</div>
